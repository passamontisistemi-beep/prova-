<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I Giganti della Sardegna</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
html,body{margin:0;height:100%;font-family:Arial,sans-serif}
.page{display:none;height:100vh}
.show{display:block}
#home{
background:url('image.png') center/cover no-repeat;
color:#fff;
position:relative;
}
#home::before{
content:'';
position:absolute;inset:0;
background:rgba(0,0,0,.45);
}
.homebox{
position:relative;z-index:2;
height:100%;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:14px;
}
.flags{display:flex;justify-content:flex-end;gap:6px;flex-wrap:wrap}
.flags button,.topbar button,.topbar select,.topbar input{
padding:10px;border:none;border-radius:12px
}
.hero{text-align:center;margin-top:8vh}
.hero h1{
font-size:clamp(34px,8vw,74px);
margin:0;color:#f3d18b
}
.hero p{font-size:18px}
.mainbtn{
background:#0c4f77;color:#fff;
font-weight:700;cursor:pointer
}
.footer{
background:#111;color:#fff;
text-align:center;padding:10px
}
.footer b{font-weight:900}
#mapPage{background:#111;color:#fff}
.topbar{
padding:8px;
display:flex;
gap:6px;
flex-wrap:wrap;
align-items:center;
background:#111
}
#map{height:calc(100vh - 140px)}
.rss{
background:#111;color:#fff;
overflow:hidden;white-space:nowrap;
padding:8px
}
.move{
display:inline-block;
animation:mar 18s linear infinite
}
@keyframes mar{
from{transform:translateX(100%)}
to{transform:translateX(-100%)}
}
a{color:#0056ff}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="page show">
<div class="homebox">

<div class="flags">
<button onclick="setLang('it')">🇮🇹</button>
<button onclick="setLang('en')">🇬🇧</button>
<button onclick="setLang('fr')">🇫🇷</button>
<button onclick="setLang('es')">🇪🇸</button>
<button onclick="setLang('de')">🇩🇪</button>
</div>

<div class="hero">
<h1>I Giganti della Sardegna</h1>
<p id="subtitle">Esplora i luoghi storici della Sardegna</p>
<button class="mainbtn" onclick="openMap()">ESPLORA MAPPA</button>
</div>

<div>
<div class="rss"><div class="move">prova prova prova • prova prova prova • prova prova prova •</div></div>
<div class="footer"><b>PASSAMONTI</b>_COMMUNICATION</div>
</div>

</div>
</div>

<!-- MAPPA -->
<div id="mapPage" class="page">
<div class="topbar">
<button id="homeBtn" onclick="goHome()">Home</button>
<button onclick="gps()">GPS</button>

<select id="filter" onchange="draw()">
<option value="all">Tutti</option>
<option value="Nuraghe">Nuraghi</option>
<option value="Domus">Domus</option>
<option value="Borgo">Borghi</option>
<option value="Comune">Comuni</option>
</select>

<input id="search" placeholder="Cerca">
<button onclick="findPlace()">Vai</button>
</div>

<div id="map"></div>

<div class="rss"><div class="move">prova prova prova • prova prova prova • prova prova prova •</div></div>
<div class="footer"><b>PASSAMONTI</b>_COMMUNICATION</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let lang='it';
let map;
let started=false;
let layers=[];

const data = [
['Bosa','Borgo','Bosa',40.3,8.5,'blue','Bosa'],
['Castelsardo','Borgo','Castelsardo',40.92,8.71,'blue','Castelsardo'],
['Lollove','Borgo','Nuoro',40.365,9.3324,'blue','Lollove'],

['Su Nuraxi','Nuraghe','Barumini',39.703,8.999,'red','Su_Nuraxi'],
['Nuraghe Arrubiu','Nuraghe','Orroli',39.662,9.298,'red','Nuraghe_Arrubiu'],
['Palmavera','Nuraghe','Alghero',40.604,8.254,'red','Palmavera'],
['Santu Antine','Nuraghe','Torralba',40.515,8.77,'red','Nuraghe_Santu_Antine'],

['Anghelu Ruju','Domus', 'Alghero',40.6275,8.3197,'green','Anghelu_Ruju'],
['Montessu','Domus','Villaperuccio',39.1242,8.6658,'green','Necropoli_di_Montessu'],

['Barumini','Comune','Barumini',39.704,9.004,'white','Barumini'],
['Torralba','Comune','Torralba',40.513,8.760,'white','Torralba'],
['Orroli','Comune','Orroli',39.693,9.250,'white','Orroli']
];

function setLang(l){
lang=l;
homeBtn.textContent=(lang==='fr')?'Accueil':(lang==='es')?'Inicio':(lang==='de')?'Start':'Home';
}

function openMap(){
home.classList.remove('show');
mapPage.classList.add('show');

if(!started){
map=L.map('map').setView([40,9],8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
draw();
started=true;
setTimeout(()=>map.invalidateSize(),300);
}
}

function goHome(){
mapPage.classList.remove('show');
home.classList.add('show');
}

function wiki(slug){
return 'https://'+lang+'.wikipedia.org/wiki/'+slug;
}

function clearMap(){
layers.forEach(x=>map.removeLayer(x));
layers=[];
}

function draw(){
clearMap();

const f=filter.value;
const arr=(f==='all')?data:data.filter(x=>x[1]===f);

arr.forEach(p=>{
let style;
if(p[1]==='Comune'){
style={radius:7,color:'#fff',fillOpacity:0,weight:2};
}else{
style={radius:7,color:p[5],fillColor:p[5],fillOpacity:1};
}

const m=L.circleMarker([p[3],p[4]],style)
.addTo(map)
.bindPopup(
'<b><a target=_blank href="'+wiki(p[6])+'">'+p[0]+'</a></b><br>'+p[1]+'<br>'+p[2]
);

layers.push(m);
});
}

function findPlace(){
const q=search.value.toLowerCase();
const p=data.find(x=>x[0].toLowerCase().includes(q));
if(p){map.setView([p[3],p[4]],12);}
}

function gps(){
navigator.geolocation.getCurrentPosition(pos=>{
map.setView([pos.coords.latitude,pos.coords.longitude],10);
L.marker([pos.coords.latitude,pos.coords.longitude]).addTo(map);
});
}
</script>
</body>
</html>
