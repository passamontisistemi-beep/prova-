<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I Giganti della Sardegna</title>
</head>
<body>
<style>html,body{margin:0;height:100%;font-family:Arial}#home,#mapPage{display:none;height:100vh}.show{display:block}#home{background:#111;color:#fff;padding:30px;text-align:center}button{padding:10px 14px;border:none;border-radius:12px;margin:4px}#map{height:80vh}</style>
<div id='home' class='show'><h1>I Giganti della Sardegna</h1><button onclick='openMap()' style='background:#003c63;color:#fff;font-size:20px'>ESPLORA MAPPA</button><div style='background:#111;color:#fff;overflow:hidden;white-space:nowrap'><div style='display:inline-block;animation:mar 60s linear infinite'>Questo spazio è riservato alla pubblicazione delle informazioni sul patrimonio enogastronomico di quell'area e le ultime notizie ed eventi acquisite dal sito AGID dei comuni limitrofi •</div></div><p><b>PASSAMONTI</b>_COMMUNICATION</p></div>
<div id='mapPage'><button onclick='goHome()'>Home</button><button onclick='gps()'>GPS</button><div id='map'></div><p><b>PASSAMONTI</b>_COMMUNICATION</p></div>
<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'><script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
<script>
let map,loaded=false;const pts=[['Bosa',40.3,8.5,'blue'],['Castelsardo',40.92,8.71,'blue'],['Lollove',40.365,9.3324,'blue'],['Su Nuraxi',39.703,8.999,'red'],['Nuraghe Arrubiu',39.662,9.298,'red'],['Palmavera',40.604,8.254,'red'],['Santu Antine',40.515,8.77,'red'],['Anghelu Ruju',40.6275,8.3197,'green'],['Montessu',39.1242,8.6658,'green'],['Pranu Mutteddu',39.5761,9.2781,'green'],['Barumini',39.704,9.004,'white'],['Orroli',39.693,9.25,'white']];function openMap(){home.classList.remove('show');mapPage.classList.add('show');if(!loaded){map=L.map('map').setView([40,9],8);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);pts.forEach(p=>L.circleMarker([p[1],p[2]],{radius:7,color:p[3],fillColor:p[3],fillOpacity:1}).addTo(map).bindPopup(p[0]));loaded=true;setTimeout(()=>map.invalidateSize(),200)}}function goHome(){mapPage.classList.remove('show');home.classList.add('show')}function gps(){navigator.geolocation.getCurrentPosition(pos=>map.setView([pos.coords.latitude,pos.coords.longitude],10));}
</script>
</body>
</html>
